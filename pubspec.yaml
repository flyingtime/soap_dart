name: soap_dart
description: SOAP runtime and WSDL-to-Dart generator inspired by wsdl2go.
version: 0.1.0
repository: https://github.com/flyingtime/soap_dart

environment:
  sdk: ^3.0.0

dependencies:
  args: ^2.5.0
  analyzer: ">=6.2.0 <7.0.0"
  build: ">=2.4.1 <2.5.0"
  code_builder: ">=4.10.0 <5.0.0"
  http: ^1.1.0
  path: ^1.9.0
  source_gen: ">=1.5.0 <2.0.0"
  xml: ">=6.4.2 <7.0.0"

dev_dependencies:
  build_runner: ">=2.4.8 <2.5.0"
  lints: ^2.1.1
  test: ">=1.24.9 <1.26.0"

executables:
  wsdl2dart: wsdl2dart
